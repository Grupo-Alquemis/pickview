document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\n\n    <main class=\"pv-main\" style=\"flex:1;min-width:340px;padding:24px 28px;overflow:hidden\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px\">\n        <h2 style=\"font-size:16px;font-weight:600;letter-spacing:-0.2px\">Plano del CEDI<\u002Fh2>\n        <div style=\"display:flex;gap:15px;font-size:12px;color:#8A8A82;align-items:center;flex-wrap:wrap\">\n          <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#EDEBE4;border:1px solid #E0DDD4\"><\u002Fspan>Vacía<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#fff;border:1px solid #C7C4BA\"><\u002Fspan>Ocupada · nº SKUs<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:11px;height:11px;border-radius:3px;background:{{ accent }}\"><\u002Fspan>Seleccionada<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px\">\n        <span style=\"font-size:11px;letter-spacing:0.4px;text-transform:uppercase;color:#A8A69C;margin-right:2px\">Filtrar<\u002Fspan>\n        <sc-for list=\"{{ catChips }}\" as=\"c\" hint-placeholder-count=\"2\">\n          <button sc-camel-on-click=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n        <span style=\"width:1px;height:18px;background:#E7E5DE;margin:0 2px\"><\u002Fspan>\n        <sc-for list=\"{{ marcaChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <button sc-camel-on-click=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ filterOn }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ onClearFilter }}\" style=\"border:none;background:none;cursor:pointer;color:{{ accent }};font-size:12.5px;font-family:inherit;padding:6px 4px\">✕ Quitar filtro<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div class=\"pv-scroll pv-maparea\" style=\"overflow:auto;padding:22px 24px 24px;background:#fff;border:1px solid #E7E5DE;border-radius:16px;max-height:calc(100vh - 150px)\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px;min-width:760px\">\n          <div style=\"display:flex;align-items:center;gap:8px;background:#EFEEE8;border-radius:8px;padding:7px 13px;font-size:12px;color:#6a6a62;font-weight:500\">\n            <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#8A8A82\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M3 9l9-6 9 6v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z\"><\u002Fpath><path d=\"M9 21V12h6v9\"><\u002Fpath><\u002Fsvg>\n            Entrada / Muelle\n          <\u002Fdiv>\n          <div style=\"flex:1;height:1px;background:repeating-linear-gradient(90deg,#DCDAD1 0 8px,transparent 8px 16px)\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:12px;margin-bottom:6px;min-width:760px\">\n          <div style=\"width:64px;flex-shrink:0\"><\u002Fdiv>\n          <div style=\"flex:1;display:grid;grid-template-columns:repeat(11,1fr);gap:6px\">\n            <sc-for list=\"{{ posHeaders }}\" as=\"ph\" hint-placeholder-count=\"11\">\n              <div style=\"text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#A8A69C\">{{ ph }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:7px;min-width:760px\">\n          <sc-for list=\"{{ aisles }}\" as=\"row\" hint-placeholder-count=\"13\">\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <div style=\"width:64px;flex-shrink:0;display:flex;align-items:center;gap:8px\">\n                <span style=\"font-size:10px;color:#A8A69C\">Pas.<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;letter-spacing:-0.5px\">{{ row.letter }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"flex:1;display:grid;grid-template-columns:repeat(11,1fr);gap:6px\">\n                <sc-for list=\"{{ row.cells }}\" as=\"c\" hint-placeholder-count=\"11\">\n                  <button class=\"pv-cell\" sc-camel-on-click=\"{{ c.onClick }}\" title=\"{{ c.title }}\" style=\"{{ c.style }}\">\n                    <sc-if value=\"{{ c.occupied }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:{{ c.txt }}\">{{ c.count }}<\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ showImport }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ onCloseImport }}\" style=\"position:fixed;inset:0;background:rgba(26,26,23,0.42);z-index:60;display:flex;align-items:center;justify-content:center;padding:24px\">\n      <div sc-camel-on-click=\"{{ stop }}\" style=\"width:600px;max-width:100%;max-height:88vh;overflow-y:auto;background:#fff;border-radius:18px;box-shadow:0 30px 70px -20px rgba(26,26,23,0.4)\" class=\"pv-scroll\">\n        <div style=\"padding:24px 28px;border-bottom:1px solid #F0EEE8;display:flex;align-items:flex-start;justify-content:space-between;gap:16px\">\n          <div>\n            <div style=\"font-size:18px;font-weight:700;letter-spacing:-0.3px\">Importar inventario<\u002Fdiv>\n            <div style=\"font-size:13px;color:#8A8A82;margin-top:4px;line-height:1.5\">Sube un <b>.csv<\u002Fb>/<b>.xlsx→.csv<\u002Fb>/<b>.json<\u002Fb> o pega el contenido. Reemplaza los datos y se guarda en este navegador.<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ onCloseImport }}\" style=\"border:none;background:#F5F4EF;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;color:#6a6a62;flex-shrink:0\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:24px 28px\">\n          <div style=\"display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap\">\n            <label style=\"flex:1;min-width:180px;display:flex;align-items:center;justify-content:center;gap:9px;border:1.5px dashed #D8D5CC;border-radius:12px;padding:16px;cursor:pointer;font-size:13.5px;color:#5a5a52;background:#FAFAF8\">\n              <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#8A8A82\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 3v5h5\"><\u002Fpath><path d=\"M14 3H6a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8z\"><\u002Fpath><\u002Fsvg>\n              Subir CSV/JSON\n              <input type=\"file\" accept=\".csv,.json,text/csv,application/json\" sc-camel-on-change=\"{{ onFile }}\" style=\"display:none\">\n            <\u002Flabel>\n            <a href=\"inventario.csv\" download=\"\" style=\"flex:1;min-width:180px;display:flex;align-items:center;justify-content:center;gap:9px;border:1px solid #E7E5DE;border-radius:12px;padding:16px;font-size:13.5px;color:#5a5a52;background:#fff\">\n              <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#8A8A82\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12\"><\u002Fpath><path d=\"M7 10l5 5 5-5\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n              Descargar plantilla\n            <\u002Fa>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;letter-spacing:0.4px;text-transform:uppercase;color:#8A8A82;margin-bottom:8px\">O pega el contenido<\u002Fdiv>\n          <textarea value=\"{{ importText }}\" sc-camel-on-change=\"{{ onImportText }}\" placeholder=\"SKU,Producto,Marca,Categoria,ABC,Ubicacion\" style=\"width:100%;min-height:150px;resize:vertical;border:1px solid #E7E5DE;border-radius:12px;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.6;background:#FAFAF8;color:#1A1A17\"><\u002Ftextarea>\n          <div style=\"margin-top:14px;background:#F5F4EF;border-radius:11px;padding:13px 15px;font-size:12.5px;color:#6a6a62;line-height:1.6\"><b>Columnas:<\u002Fb> <span style=\"font-family:'IBM Plex Mono',monospace\">SKU, Producto, Marca, Categoria, ABC, Ubicacion<\u002Fspan>. Ubicación tipo <span style=\"font-family:'IBM Plex Mono',monospace\">BPT-RCK-A-01-1<\u002Fspan>. Excel: guarda como CSV antes de subir.<\u002Fdiv>\n          <sc-if value=\"{{ importError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:14px;background:#FCE8E6;color:#b3261e;border-radius:11px;padding:13px 15px;font-size:13px;line-height:1.5\">{{ importErrorMsg }}<\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ importPreview }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:14px;background:#E9F6EC;color:#1f7a37;border-radius:11px;padding:13px 15px;font-size:13px\">{{ importPreviewMsg }}<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"padding:18px 28px;border-top:1px solid #F0EEE8;display:flex;gap:10px;justify-content:flex-end\">\n          <button sc-camel-on-click=\"{{ onResetData }}\" style=\"margin-right:auto;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13px;color:#8A8A82\">Restaurar datos CEDI<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ onCloseImport }}\" style=\"border:1px solid #E7E5DE;background:#fff;border-radius:10px;padding:11px 18px;cursor:pointer;font-family:inherit;font-size:13.5px;color:#5a5a52\">Cancelar<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ onApplyImport }}\" style=\"border:none;background:{{ accent }};color:#fff;border-radius:10px;padding:11px 20px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:500\">Cargar {{ importCountLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  \n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:760},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E8590C&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#E8590C&quot;,&quot;#2563EB&quot;,&quot;#0E9F6E&quot;,&quot;#7C3AED&quot;]},&quot;whName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Principal&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;whCode&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;BPT&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nconst STORE_KEY = \"pickview_cedi_v2\";\nconst AISLES = [\"A\",\"B\",\"C\",\"D\",\"E\",\"F\",\"G\",\"H\",\"I\",\"J\",\"K\",\"L\",\"M\"];\nconst MAXPOS = 11;\nconst CATICON = { \"Alimentos\":\"🍪\", \"Cuidado personal\":\"🧴\" };\n\nfunction iconFor(cat){ return CATICON[cat] || \"📦\"; }\n\nfunction brandLogo(marca){\n  const m = (marca||\"\").toLowerCase();\n  if(m.includes(\"bioland\")) return \"assets/bioland.png\";\n  if(m.includes(\"seed\")) return \"assets/seed.png\";\n  if(m.includes(\"terre\")) return \"assets/terredevie.png\";\n  if(m.includes(\"reserve\")) return \"assets/reserve11.png\";\n  return \"\";\n}\nfunction photoFor(sku){ return (typeof window!==\"undefined\" && window.CEDI_PHOTOS && window.CEDI_PHOTOS[sku]) || \"\"; }\nfunction imgEl(src, cover){ return src ? React.createElement(\"img\",{src:src,alt:\"\",style:{maxWidth:\"100%\",maxHeight:\"100%\",width:cover?\"100%\":\"auto\",height:cover?\"100%\":\"auto\",objectFit:cover?\"cover\":\"contain\"}}) : null; }\nfunction thumbEl(p){ const ph = photoFor(p.sku); if(ph) return imgEl(ph,false); const l = brandLogo(p.marca); return l ? imgEl(l,false) : null; }\nfunction withLogo(p){ const ph = photoFor(p.sku); const l = brandLogo(p.marca); const t = thumbEl(p); return { ...p, photo: ph, hasPhoto: !!ph, logo: l, hasLogo: !!l, thumbEl: t, hasThumb: !!t, noThumb: !t }; }\n\nfunction parseCode(ubic){\n  const m = String(ubic||\"\").match(/-RCK-([A-Za-z])-(\\d+)-(\\d+)$/);\n  if(m) return { aisle:m[1].toUpperCase(), pos:parseInt(m[2],10), level:parseInt(m[3],10), placed:true };\n  return { aisle:null, pos:null, level:null, placed:false };\n}\n\nfunction normalizeRows(rows){\n  const out = [];\n  rows.forEach((r,i) => {\n    const g = (...keys) => { for(const k of keys){ for(const rk in r){ if(rk.trim().toLowerCase()===k){ return String(r[rk]).trim(); } } } return \"\"; };\n    const sku = g(\"sku\",\"código\",\"codigo\");\n    const name = g(\"producto\",\"nombre\",\"name\",\"descripcion\",\"descripción\");\n    if(!sku && !name) return;\n    const cat = g(\"categoria\",\"categoría\",\"category\") || \"(sin clasif)\";\n    const ubic = g(\"ubicacion\",\"ubicación\",\"location\",\"code\",\"código\") || \"(sin ubic)\";\n    const c = parseCode(ubic);\n    out.push({ id:i+1, sku:sku||(\"SIN-SKU-\"+(i+1)), name:name||sku, marca:g(\"marca\",\"brand\")||\"(s/d)\", cat, abc:g(\"abc\",\"rotacion\",\"rotación\")||\"\", orden:parseInt(g(\"ordenubic\",\"orden\")||\"0\",10)||0, icon:iconFor(cat), code:ubic, ...c });\n  });\n  return out;\n}\n\nfunction parseCSV(text){\n  const lines = text.trim().split(/\\r?\\n/).filter(l => l.trim());\n  if(!lines.length) return [];\n  const split = (l) => l.split(\",\").map(c => c.trim().replace(/^\"|\"$/g,\"\"));\n  const header = split(lines[0]).map(h => h.toLowerCase());\n  return lines.slice(1).map(l => { const cells = split(l); const o = {}; header.forEach((h,i)=>o[h]=cells[i]??\"\"); return o; });\n}\n\nfunction parseInput(text){\n  const t = text.trim();\n  if(!t) throw new Error(\"No hay contenido para importar.\");\n  let rows;\n  if(t[0]===\"[\" || t[0]===\"{\"){ const d = JSON.parse(t); rows = Array.isArray(d)?d:(d.items||d.productos||[]); }\n  else rows = parseCSV(t);\n  const products = normalizeRows(rows);\n  if(!products.length) throw new Error(\"No se encontraron filas válidas. Revisa las columnas (SKU, Producto, Ubicacion).\");\n  return products;\n}\n\nconst USERS = [\n  { user:\"admin\", pass:\"alquemis\", name:\"Administrador\", role:\"Supervisor\" },\n  { user:\"picking\", pass:\"1234\", name:\"Operario de Picking\", role:\"Picking\" },\n  { user:\"mbarquero\", pass:\"maria2026\", name:\"María Barquero\", role:\"Picking\" },\n];\nconst SESSION_KEY = \"pickview_session_v1\";\n\nclass Component extends DCLogic {\n  state = { auth:null, loginUser:\"\", loginPass:\"\", loginError:\"\", query:\"\", products:[], selId:null, selCell:null, showUnplaced:false, showImport:false, importText:\"\", importError:\"\", importPreview:null, filterCat:\"\", filterMarca:\"\" };\n\n  doLogin(){\n    const u = (this.state.loginUser||\"\").trim().toLowerCase();\n    const p = (this.state.loginPass||\"\");\n    const found = USERS.find(x => x.user===u && x.pass===p);\n    if(!found){ this.setState({ loginError:\"Usuario o contraseña incorrectos.\" }); return; }\n    const auth = { user:found.user, name:found.name, role:found.role };\n    try { localStorage.setItem(SESSION_KEY, JSON.stringify(auth)); } catch(e){}\n    this.setState({ auth, loginError:\"\", loginPass:\"\", loginUser:\"\" });\n  }\n  logout(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} this.setState({ auth:null }); }\n\n  seed(){ return (typeof window!==\"undefined\" && window.CEDI_INVENTORY) ? window.CEDI_INVENTORY : []; }\n  loadSeed(tries){\n    const s = this.seed();\n    if(s.length){ this.setState({ products: s }); return; }\n    if((tries||0) < 40){ setTimeout(() => this.loadSeed((tries||0)+1), 80); }\n  }\n  componentDidMount(){\n    try { const s = localStorage.getItem(SESSION_KEY); if(s){ this.setState({ auth: JSON.parse(s) }); } } catch(e){}\n    try {\n      const saved = localStorage.getItem(STORE_KEY);\n      if(saved){ const p = JSON.parse(saved); if(Array.isArray(p)&&p.length){ this.setState({products:p}); return; } }\n    } catch(e){}\n    this.loadSeed(0);\n  }\n\n  pick(p){ this.setState({ selId:p.id, selCell:null, showUnplaced:false, query:\"\" }); }\n  clear(){ this.setState({ selId:null, selCell:null, showUnplaced:false, query:\"\" }); }\n  clickCell(aisle,pos){ this.setState({ selCell:{aisle,pos}, selId:null, showUnplaced:false, query:\"\" }); }\n\n  tryPreview(text){ if(!text.trim()){ this.setState({importText:text,importError:\"\",importPreview:null}); return; } try{ const p=parseInput(text); this.setState({importText:text,importError:\"\",importPreview:p}); }catch(e){ this.setState({importText:text,importError:e.message,importPreview:null}); } }\n  applyImport(){ const p=this.state.importPreview; if(!p||!p.length){ this.setState({importError:\"Nada válido para cargar.\"}); return; } try{ localStorage.setItem(STORE_KEY,JSON.stringify(p)); }catch(e){} this.setState({products:p,showImport:false,selId:null,selCell:null,query:\"\",importText:\"\",importPreview:null,importError:\"\"}); }\n  resetData(){ try{ localStorage.removeItem(STORE_KEY); }catch(e){} this.setState({selId:null,selCell:null,query:\"\",showImport:false,importText:\"\",importPreview:null,importError:\"\"}); this.loadSeed(0); }\n\n  renderVals(){\n    const accent = this.props.accent ?? \"#E8590C\";\n    const P = this.state.products || [];\n    const placed = P.filter(p=>p.placed);\n    const unplaced = P.filter(p=>!p.placed);\n    const q = (this.state.query||\"\").trim().toLowerCase();\n    const matches = q ? P.filter(p => p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)||(p.marca||\"\").toLowerCase().includes(q)||(p.code||\"\").toLowerCase().includes(q)).slice(0,60) : [];\n\n    const sel = P.find(p=>p.id===this.state.selId) || null;\n    const cell = this.state.selCell;\n\n    // build slot map aisle-pos -> products\n    const slot = {};\n    placed.forEach(p => { const k = p.aisle+\"-\"+p.pos; (slot[k]=slot[k]||[]).push(p); });\n\n    const abcTheme = { A:{bg:\"#E9F6EC\",c:\"#1f7a37\"}, B:{bg:\"#FEF3E0\",c:\"#b5771a\"}, C:{bg:\"#F0EEF9\",c:\"#6b5aa8\"} };\n    const at = sel ? (abcTheme[sel.abc]||{bg:\"#F5F4EF\",c:\"#6a6a62\"}) : {bg:\"#F5F4EF\",c:\"#6a6a62\"};\n\n    const highlightKey = sel && sel.placed ? sel.aisle+\"-\"+sel.pos : (cell ? cell.aisle+\"-\"+cell.pos : null);\n\n    const fCat = this.state.filterCat, fMarca = this.state.filterMarca;\n    const filterOn = !!(fCat || fMarca);\n    const matchProd = (p) => (!fCat || p.cat===fCat) && (!fMarca || p.marca===fMarca);\n\n    const aisles = AISLES.map(letter => {\n      const cells = [];\n      for(let pos=1; pos<=MAXPOS; pos++){\n        const k = letter+\"-\"+pos;\n        const items = slot[k] || [];\n        const occupied = items.length>0;\n        const matchCount = filterOn ? items.filter(matchProd).length : items.length;\n        const dim = filterOn && occupied && matchCount===0;\n        const isSel = highlightKey === k;\n        let bg=\"#EDEBE4\", border=\"1px solid #E0DDD4\", txt=\"#B0AEA4\";\n        if(occupied){ bg=\"#fff\"; border=\"1px solid #C7C4BA\"; txt=\"#5a5a52\"; }\n        if(filterOn && occupied && matchCount>0){ bg=\"#FDEEE3\"; border=\"1px solid \"+accent; txt=accent; }\n        if(isSel){ bg=accent; border=\"1px solid \"+accent; txt=\"#fff\"; }\n        cells.push({\n          key:k, count: filterOn ? matchCount : items.length, occupied, txt,\n          title: occupied ? `Pasillo ${letter} · Pos ${pos} — ${items.length} SKU(s)` : `Pasillo ${letter} · Pos ${pos} — vacía`,\n          style:`display:flex;align-items:center;justify-content:center;aspect-ratio:1/1;min-height:40px;border-radius:8px;cursor:${occupied?'pointer':'default'};background:${bg};border:${border};transition:transform .1s ease;opacity:${dim?'0.32':'1'};${isSel?'transform:scale(1.08);box-shadow:0 6px 16px -5px '+accent+'99;z-index:2':''}`,\n          onClick: occupied ? () => this.clickCell(letter,pos) : () => {},\n        });\n      }\n      return { letter, cells };\n    });\n\n    const cats = [...new Set(P.map(p=>p.cat))];\n    const marcas = [...new Set(P.map(p=>p.marca))].filter(m=>m&&m!==\"(s/d)\");\n    const chipStyle = (on) => `border:1px solid ${on?accent:'#E0DDD4'};background:${on?accent:'#fff'};color:${on?'#fff':'#5a5a52'};border-radius:20px;padding:6px 13px;cursor:pointer;font-family:inherit;font-size:12.5px;white-space:nowrap;transition:all .12s ease`;\n    const catChips = cats.map(c => ({ label:c, style: chipStyle(fCat===c), onClick: () => this.setState({ filterCat: fCat===c?\"\":c }) }));\n    const marcaChips = marcas.map(m => ({ label:m, style: chipStyle(fMarca===m), onClick: () => this.setState({ filterMarca: fMarca===m?\"\":m }) }));\n\n    // same slot (physical aisle-pos, both levels) for selected product\n    const sameSlot = sel && sel.placed ? (slot[sel.aisle+\"-\"+sel.pos]||[]).filter(p=>p.id!==sel.id).sort((a,b)=>a.level-b.level||a.orden-b.orden) : [];\n\n    // cell view products\n    const cellItems = cell ? (slot[cell.aisle+\"-\"+cell.pos]||[]).slice().sort((a,b)=>a.level-b.level||a.orden-b.orden) : [];\n\n    // category stats\n    const catMap = {};\n    P.forEach(p=>{ catMap[p.cat]=(catMap[p.cat]||0)+1; });\n    const catStats = Object.keys(catMap).sort((a,b)=>catMap[b]-catMap[a]).map(name=>({ name, count:catMap[name], icon:iconFor(name) }));\n\n    return {\n      accent,\n      authed: !!this.state.auth,\n      notAuthed: !this.state.auth,\n      authName: this.state.auth ? this.state.auth.name : \"\",\n      authRole: this.state.auth ? this.state.auth.role : \"\",\n      authInitial: this.state.auth ? (this.state.auth.name||\"?\").slice(0,1).toUpperCase() : \"\",\n      loginUser: this.state.loginUser,\n      loginPass: this.state.loginPass,\n      loginHasError: !!this.state.loginError,\n      loginError: this.state.loginError,\n      onLoginUser: (e)=>this.setState({loginUser:e.target.value,loginError:\"\"}),\n      onLoginPass: (e)=>this.setState({loginPass:e.target.value,loginError:\"\"}),\n      onLoginKey: (e)=>{ if(e.key===\"Enter\") this.doLogin(); },\n      onLogin: ()=>this.doLogin(),\n      onLogout: ()=>this.logout(),\n      filterOn,\n      catChips, marcaChips,\n      onClearFilter: ()=>this.setState({filterCat:\"\",filterMarca:\"\"}),\n      whName: this.props.whName ?? \"Principal\",\n      whCode: this.props.whCode ?? \"BPT\",\n      query: this.state.query||\"\",\n      hasQuery: (this.state.query||\"\").length>0,\n      showResults: q.length>0,\n      hasMatches: matches.length>0,\n      noMatches: matches.length===0,\n      resultLabel: `${matches.length}${matches.length===60?'+':''} resultado${matches.length===1?'':'s'}`,\n      matches: matches.map(p=>({ ...withLogo(p), pick:()=>this.pick(p), locLabel: p.placed?`${p.aisle}-${String(p.pos).padStart(2,'0')}`:\"sin ubic\", locColor: p.placed?accent:\"#c98a2a\", locBg: p.placed?\"#FDEEE3\":\"#FBF0DE\" })),\n      placedCount: placed.length,\n      unplacedCount: unplaced.length,\n\n      asideCls: (sel || cell || this.state.showUnplaced) ? \"active\" : \"inactive\",\n      viewProduct: !!sel,\n      viewCell: !sel && !!cell,\n      viewUnplaced: !sel && !cell && this.state.showUnplaced,\n      viewEmpty: !sel && !cell && !this.state.showUnplaced,\n\n      selPlaced: !!(sel && sel.placed),\n      selUnplaced: !!(sel && !sel.placed),\n      selCode: sel?sel.code:\"\",\n      selName: sel?sel.name:\"\",\n      selSku: sel?sel.sku:\"\",\n      selIcon: sel?sel.icon:\"\",\n      selMarca: sel?sel.marca:\"\",\n      selPhotoEl: sel?imgEl(photoFor(sel.sku),true):null,\n      selHasPhoto: !!(sel&&photoFor(sel.sku)),\n      selThumbEl: sel?thumbEl(sel):null,\n      selHasThumb: !!(sel&&thumbEl(sel)),\n      selNoThumb: !!(sel&&!thumbEl(sel)),\n      selCat: sel?sel.cat:\"\",\n      selAbc: sel?(sel.abc||\"—\"):\"\",\n      abcBg: at.bg, abcColor: at.c,\n      selAisle: sel?sel.aisle:\"\",\n      selPos: sel?String(sel.pos).padStart(2,'0'):\"\",\n      selLevel: sel?sel.level:\"\",\n      hasSameSlot: sameSlot.length>0,\n      sameSlotCount: sameSlot.length,\n      sameSlot: sameSlot.map(p=>({ ...withLogo(p), pick:()=>this.pick(p) })),\n\n      cellAisle: cell?cell.aisle:\"\",\n      cellPos: cell?String(cell.pos).padStart(2,'0'):\"\",\n      cellCount: cellItems.length,\n      cellProducts: cellItems.map(p=>({ ...withLogo(p), pick:()=>this.pick(p) })),\n\n      catStats,\n      unplacedList: unplaced.map(p=>({ ...withLogo(p), pick:()=>this.pick(p) })),\n\n      posHeaders: Array.from({length:MAXPOS},(_,i)=>String(i+1).padStart(2,'0')),\n      aisles,\n\n      onSearch:(e)=>this.setState({query:e.target.value,selId:null,selCell:null,showUnplaced:false}),\n      onClear:()=>this.clear(),\n      onShowUnplaced:()=>this.setState({showUnplaced:true}),\n\n      showImport:this.state.showImport,\n      importText:this.state.importText,\n      importError:!!this.state.importError,\n      importErrorMsg:this.state.importError,\n      importPreview:!!(this.state.importPreview&&this.state.importPreview.length),\n      importPreviewMsg:this.state.importPreview?`✓ ${this.state.importPreview.length} productos listos para cargar.`:\"\",\n      importCountLabel:this.state.importPreview&&this.state.importPreview.length?`(${this.state.importPreview.length})`:\"\",\n      onOpenImport:()=>this.setState({showImport:true}),\n      onCloseImport:()=>this.setState({showImport:false}),\n      stop:(e)=>e.stopPropagation(),\n      onImportText:(e)=>this.tryPreview(e.target.value),\n      onFile:(e)=>{ const f=e.target.files&&e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>this.tryPreview(String(r.result||\"\")); r.readAsText(f); },\n      onApplyImport:()=>this.applyImport(),\n      onResetData:()=>this.resetData(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
